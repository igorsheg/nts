name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Cross-compile all targets
        run: |
          mkdir -p dist
          for pair in "aarch64-macos:nts-darwin-arm64" "x86_64-macos:nts-darwin-x64" "aarch64-linux:nts-linux-arm64" "x86_64-linux:nts-linux-x64"; do
            IFS=: read -r target name <<< "$pair"
            zig build -Doptimize=ReleaseSafe -Dtarget=$target
            cp zig-out/bin/nts dist/$name
          done

      - name: Package archives
        run: |
          cd dist
          for bin in nts-*; do
            tar -czf ${bin}.tar.gz $bin
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Extract binaries
        run: |
          cd dist
          for f in *.tar.gz; do tar -xzf "$f"; done

      - name: Generate and publish npm packages
        run: |
          ./scripts/npm-stage.sh ${GITHUB_REF#refs/tags/v}
          for pkg in nts-darwin-arm64 nts-darwin-x64 nts-linux-arm64 nts-linux-x64; do
            cd npm/$pkg && npm publish --access public && cd $GITHUB_WORKSPACE
          done
          cd npm/nts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
