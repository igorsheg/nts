name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-macos
            npm_pkg: nts-darwin-arm64
          - target: x86_64-macos
            npm_pkg: nts-darwin-x64
          - target: aarch64-linux
            npm_pkg: nts-linux-arm64
          - target: x86_64-linux
            npm_pkg: nts-linux-x64
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Build
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p staging
          cp zig-out/bin/nts staging/nts
          tar -czf nts_${{ matrix.npm_pkg }}.tar.gz -C staging nts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: nts_${{ matrix.npm_pkg }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare dist
        run: |
          mkdir -p dist
          for pkg in nts-darwin-arm64 nts-darwin-x64 nts-linux-arm64 nts-linux-x64; do
            tar -xzf artifacts/$pkg/nts_$pkg.tar.gz -C dist
            mv dist/nts dist/$pkg
          done

      - name: Generate npm packages
        run: ./scripts/npm-stage.sh ${GITHUB_REF#refs/tags/v}

      - name: Publish platform packages
        run: |
          for pkg in nts-darwin-arm64 nts-darwin-x64 nts-linux-arm64 nts-linux-x64; do
            cd npm/$pkg && npm publish --access public && cd $GITHUB_WORKSPACE
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root package
        run: cd npm/nts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
